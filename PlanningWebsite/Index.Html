<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="Style.css">
    <script src="Script.Js"></script>
    <title>Planning Site</title>
</head>

<body>
    <div class="TitleContainer">
        <h1>Planning Site</h1>
    </div>
    <div class="OptionBlock" id="OptionBlock">
        <div class="OptionText">
            <h1>Title</h1>
            <input placeholder="Title name" id="TitleInput"></input>
            <h1>Title Color</h1>
            <input type="color" name="TitleColor" id="TitleColor" />
            <h1>Color</h1>
            <input type="color" name="BackgroundColor" id="BackgroundColor" />
            <h3 class="ConfirmText">Confirm?</h3>
            <button class="ConfirmButton" onclick="Confirm()"></button>
        </div>
    </div>

    <div class="MainContainer">
        <div class="BlockContainer">
            <div class="Block" id="Block">
                <button class="button" id="Button2" onclick="button('Block')">Add a block +</button>
            </div>
        </div>
        <div class="BlockContainer">
            <div class="Block1" id="Block1">
                <button class="button" id="Button2" onclick="button('Block1')">Add a block +</button>
            </div>
        </div>
        <div class="BlockContainer">
            <div class="Block2" id="Block2">
                <button class="button" id="Button2" onclick="button('Block2')">Add a block +</button>
            </div>
        </div>

    </div>
    <div class="BuildingBlock">
        <div class="Title">Make A Plan</div>
    </div>
</body>
</html>
