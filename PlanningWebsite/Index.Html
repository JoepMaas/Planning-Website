<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="Style.css">
    <script src="Script.Js"></script>
    <title>Planning Site</title>
</head>

<body>
    <div class="TitleContainer">
        <h1>Planning Site</h1>
    </div>
    <div class="OptionBlock">
        <div class="OptionText">
            <h1>Title</h1>
            <input id="TitleInput"></input>
            <h1>Title Color</h1>
            <input type="color" name="TitleColor" id="TitleColor"/>
            <h1>Color</h1>
            <input type="color" name="BackgroundColor" id="BackgroundColor"/>
        </div>
    </div>
    <div class="MainContainer">
        <div class="BlockContainer">
            <div class="Block">
                <div class="BuildingBlock">
                    <div class="Title">Make A Plan</div>
                </div>
                <div class="BuildingBlock">
                    <div class="Title">Make A Plan</div>
                </div>
                <div class="BuildingBlock">
                    <div class="Title" id="textting">Make A Plan</div>
                </div>
                <button class="button" id="Button2" onclick="button()">Add a block +</button>
            </div>
        </div>
        <div class="BlockContainer">
            <div class="SecondBlock">
                <div class="BuildingBlock">
                    <div class="Title">Make A Plan</div>
                </div>
                <button class="button">Add a block +</button>
            </div>

        </div>
        <div class="BlockContainer">
            <div class="ThirdBlock">
                <button class="button">Add a block +</button>
            </div>

        </div>
    </div>
</body>

</html>
