<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Planning Site</title>
</head>

<body>
    <div class="TopBar">
        <button id="Boards">Boards</button>
        <button id="Home">Home</button>
    </div>
    <div class="Inspector">
        <h2 id="ChosenWorkspace">WORKSPACE</h2>
        <div class="Workspace">
            <h3 class="HeadText">WORKSPACE</h3>
            <h2 class="DisplaySpace">M</h2>
            <select name="Workspace" id="WorkspaceDropdown">
                <option value="1">MyWorkspace 1</option>
                <option value="2">Workspace 2</option>
                <option value="3">Workspace 3</option>
            </select>
            <button id="Overview">Overview</button>
            <button id="Boards">Boards</button>
        </div>
        <div class="Projects">
            <h3 class="HeadText">PROJECTS</h3>
            <button id="Project1">Project 1</button>
        
            <button id="New-Board">+ New board</button>

        </div>
    </div>


</body>
</html>
